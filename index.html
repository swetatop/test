<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Модератори Ukraine GTA 5 | Оцінка роботи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <div class="bg-logo"></div>
    
    <div class="container">
        <button class="theme-toggle" id="themeToggle">🌙</button>
        
        <header>
            <img src="https://www.ukraine-gta5.com.ua/favicon.ico" alt="Лого" class="logo" onerror="this.style.display='none'">
            <h1>🛡️ Оцінка модераторів</h1>
            <p>Проєкт <strong>Ukraine GTA 5</strong> — твоя думка важлива!</p>
        </header>

        <!-- Рейтинг модераторів -->
        <div class="card stats-card">
            <h2>📊 Рейтинг модераторів</h2>
            <div id="moderStats" class="moder-stats">
                <p>Завантаження...</p>
            </div>
        </div>

        <!-- Форма оцінки -->
        <div class="card">
            <h2>✍️ Залишити відгук</h2>
            <form id="ratingForm">
                <input type="text" id="nickname" placeholder="Твій нікнейм" required maxlength="30">
                
                <div class="moder-cards" id="moderCards">
                    <div class="moder-card" data-moder="Alex">
                        <div class="moder-avatar">👑</div>
                        <div class="moder-name">Alex</div>
                    </div>
                    <div class="moder-card" data-moder="Kate">
                        <div class="moder-avatar">🌸</div>
                        <div class="moder-name">Kate</div>
                    </div>
                    <div class="moder-card" data-moder="Vlad">
                        <div class="moder-avatar">⚡</div>
                        <div class="moder-name">Vlad</div>
                    </div>
                    <div class="moder-card" data-moder="Oleg">
                        <div class="moder-avatar">🎮</div>
                        <div class="moder-name">Oleg</div>
                    </div>
                </div>
                <input type="hidden" id="selectedModer" required>

                <div class="rating-stars">
                    <span>⭐ Оцінка:</span>
                    <div class="stars" id="starRating">★★★★★</div>
                    <input type="hidden" id="ratingValue" value="0">
                </div>

                <textarea id="comment" placeholder="Коментар (не обов'язково)" rows="3"></textarea>
                
                <!-- Капча -->
                <div class="captcha">
                    <span id="captchaQuestion">2 + 3 = ?</span>
                    <input type="number" id="captchaAnswer" placeholder="Відповідь" required>
                </div>
                
                <button type="submit" id="submitBtn">
                    <span>📩 Відправити</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
            <div id="formMessage" class="message"></div>
        </div>

        <!-- Список відгуків -->
        <div class="card">
            <h2>💬 Відгуки гравців</h2>
            <div id="reviewsList">
                <p>Завантаження...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
